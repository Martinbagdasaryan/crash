name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/casino/AviaDream
            git pull origin main
            cd ./backend
            npm install
            npm run build
            cd ../frontend
            npx vite build
            pm2 restart AviaDream
            pm2 reset AviaDream
