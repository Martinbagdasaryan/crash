name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/casino/Electro-Crash
            git pull origin main
            cd ./backend
            rm -rf node_modules package-lock.json
            npm i
            npm run build
            cd ../frontend
            rm -rf node_modules package-lock.json
            npm i
            npx vite build
            pm2 restart Electro-Crash
            pm2 reset Electro-Crash
