name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/casino/Electric-Crash
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 24
            git pull origin main
            cd ./backend
            rm -rf node_modules package-lock.json
            npm i
            npm run build
            cd ../frontend
            rm -rf node_modules package-lock.json
            npm i
            npx vite build
            pm2 restart Electric-Crash
            pm2 reset Electric-Crash
